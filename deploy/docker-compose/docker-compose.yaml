networks:
    1panel-network:
        external: true
services:
  server:
    build:
      context: ../../server
    restart: always
    container_name: superadmin_server
    environment:
      - TZ=Asia/Shanghai

      # 使用 sqlite
      # - DRIVER_NAME=sqlite
      # - DATASOURCE=postgres://root:123456@postgres:5432/jzero-admin

#      # 使用 mysql
      - DRIVER_NAME=mysql
      - DATASOURCE=jzero-admin:xAz8JWkakJ5zt4XN@tcp(mysql:3306)/jzero-admin?charset=utf8mb4&parseTime=True&loc=Local

#      # 使用 postgres
#      - DRIVER_NAME=pgx
#      - DATASOURCE=postgres://root:123456@postgres:5432/jzero-admin

      # 使用 miniredis(内存)
      - REDIS_MINI_REDIS=true
    ports:
      - "8001:8001"
    networks:
        - 1panel-network
