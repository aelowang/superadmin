name: 部署主分支代码

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 通知部署
        run: |
          curl -v "https://api.telegram.org/bot${{ vars.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
            -d text="🚀 *开始部署* %0A项目 onecode/superadmin %0A分支: refs/heads/main" \
            -d parse_mode="Markdown"

      - name: 检出代码
        uses: actions/checkout@v3

      - name: Set up SSH keys
        run: |
          echo "${{ secrets.SSH_MAIN_PRIVATE_KEY }}" > test.pem
          chmod 600 test.pem

      - name: 更新项目代码
        run: |
          ssh -i test.pem -T -o StrictHostKeyChecking=no ubuntu@${{vars.MAIN_SSH_SERVER}} << 'EOF'
            cd ./superadmin/
            git reset --hard origin/main
            git checkout main
            git pull
            sudo docker restart superadmin_server
            sudo docker restart superadmin_web
          EOF
      
      - name: 通知完成
        if: ${{ success() }}
        run: |
          curl -X POST "https://api.telegram.org/bot${{ vars.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
          -d text="✅ *部署成功* %0A项目 onecode/superadmin %0A分支:refs/heads/main" \
          -d parse_mode="Markdown"

      - name: 通知失败
        if: ${{ failure() }}
        run: |
          curl -X POST "https://api.telegram.org/bot${{ vars.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ vars.TELEGRAM_CHAT_ID }} \
             -d text="❌ *部署失败* %0A项目 onecode/superadmin %0A分支:refs/heads/main" \
            -d parse_mode="Markdown"