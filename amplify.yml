version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - cd web && pnpm install && pnpm run build
    build:
      commands:
        - echo "Build completed in preBuild"
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"
  cache:
    paths:
      - web/node_modules/**/*
